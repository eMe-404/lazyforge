# lazyforge tmux config

# --- Prefix ---
# Keep ctrl+b (default) so Ghostty can reliably send \x02 for keybind passthrough
set -g prefix C-b
bind C-b send-prefix

# --- General ---
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g escape-time 0
set -g history-limit 50000
set -g mouse on

# --- Vi copy mode ---
set -g mode-keys vi

# Enter copy mode (prefix + [ OR directly via F1 as fallback)
bind [ copy-mode

# Vi-style selection and yank
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Y   send -X copy-end-of-line \; run "tmux save-buffer - | pbcopy"

# Exit copy mode
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi q      send -X cancel
